<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doce Carola</title>

  <!-- ÍCONES E FONTES -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* FUNDO CORRETO */
  background-image: url('./caradapio/assets/img/brigadeiros.jpeg');
  background-size: cover;         /* ocupa tudo sem distorcer */
  background-position: center;    /* centraliza */
  background-repeat: no-repeat;   /* evita repetir */
  background-attachment: fixed;   /* efeito profissional (desktop) */

  padding: 20px; /* evita colar nas bordas */
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25); /* escurece levemente */
  z-index: 0;
}

#main {
  position: relative;
  z-index: 1;
}

    #main {
      width: 90%;
      max-width: 400px;
      padding: 30px 20px;
      border-radius: 20px;
      background-color: #FFEDF1;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    .logo {
  font-family: 'Pacifico', cursive;
  font-size: 57px;
  color: #C8626D;
}

   .highlight-text {
  font-family: 'Pacifico', cursive;
  font-size: 20px;
  color: #A23E48; /* rosa mais escuro */
  margin: 10px 0 20px;
  text-align: center;
}

    .img-container {
      width: 200px;
      height: 200px;
      margin: 0 auto 20px;
      border-radius: 50%;
      overflow: hidden;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.1);
    }

    .btn-menu {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      border-radius: 12px;
      background-color: #C8626D;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-menu:hover {
      background-color: #a94d57;
      transform: scale(1.05);
    }

    .social {
      margin-top: 25px;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: #894E3F;
      margin: 10px 0;
      font-size: 16px;
      transition: 0.2s;
    }

    .social a:hover {
      color: #C8626D;
    }

    .social i {
      font-size: 20px;
      color: #C8626D;
    }

    /* WHATSAPP FLOAT */
    .whatsapp-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
    }

    .whatsapp-float {
      background-color: #25D366;
      color: #fff;
      font-size: 28px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      transition: 0.3s;
      animation: pulse 2s infinite;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      background-color: #1ebe5d;
      animation: none;
    }

    /* TOOLTIP */
    .tooltip {
      position: absolute;
      right: 70px;
      bottom: 15px;
      background-color: #C8626D;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(10px);
      transition: 0.3s;
    }

    .whatsapp-container:hover .tooltip {
      opacity: 1;
      transform: translateX(0);
    }

    /* ANIMAÇÃO PULSE */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
      }
    }

    @media (max-width: 500px) {
      .logo {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <section id="main">
    <h1 class="logo">Doce Carola</h1>
    
<p class="highlight-text">
  Cardápio especial de dia das mães!
</p>

    <div class="img-container">
      <img src="/caradapio/assets/img/logo.jpeg" alt="Brigadeiros">
    </div>

    <a href="paginamain.html" class="btn-menu">
      Ver Cardápio
    </a>

    <div class="social">
      <a href="https://instagram.com/nunes417" target="_blank">
        <i class="fab fa-instagram"></i>
        @nunes417
      </a>

      <a href="https://wa.me/5561985159349" target="_blank">
        <i class="fab fa-whatsapp"></i>
        (61) 98515-9349
      </a>
    </div>
  </section>

  <!-- WHATSAPP FLOAT COMPLETO -->
  <div class="whatsapp-container">
    <span class="tooltip">Fale conosco</span>
    <a href="https://wa.me/5561985159349?text=Olá,%20vim%20pelo%20site%20e%20quero%20fazer%20um%20pedido!"
       class="whatsapp-float"
       target="_blank">
      <i class="fab fa-whatsapp"></i>
    </a>
  </div>

</body>
</html>
